name: KBC Build Check

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile KBC
        run: make  # This runs the Makefile you just wrote!

      - name: Test with Valgrind
        run: |
          sudo apt-get install valgrind
          valgrind --error-exitcode=1 ./file.out ./kbc.c enc cbc ./kes.c.bin "AAAA" "BBBB"